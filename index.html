<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoraBase Smart Number-to-ID</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="bg-gray-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-black text-center text-cyan-400 mb-6 uppercase tracking-tighter">Smart OTP Sync 🚀</h1>

        <div class="bg-gray-700/50 p-4 rounded-2xl mb-6 border border-gray-600">
            <p class="text-[11px] font-bold text-gray-400 mb-3 uppercase tracking-widest text-center">নতুন নম্বর ডাটাবেসে যোগ করুন</p>
            <div class="flex justify-center">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-login="jorabase_cloud_bot" 
                        data-size="large" 
                        data-onauth="onTelegramAuth(user)" 
                        data-request-access="write"></script>
            </div>
            <button onclick="forceLogout()" class="w-full mt-3 text-[10px] bg-red-500/10 text-red-400 py-1 rounded-lg border border-red-500/20 hover:bg-red-500 hover:text-white transition">Account Switch (Logout)</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">ফোন নম্বর লিখুন</label>
                <input type="text" id="targetPhone" placeholder="যেমন: 017XXXXXXXX" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-cyan-500">
                <p id="matchStatus" class="text-[10px] mt-1 text-gray-500 italic">নম্বরটি টাইপ করলে ডাটাবেসে খোঁজা হবে...</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">ওটিপি কোড (OTP)</label>
                <input type="number" id="otpCode" placeholder="যেমন: 123456" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-cyan-500">
            </div>

            <button onclick="sendByPhone()" class="w-full bg-cyan-600 py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-cyan-500 active:scale-95 transition">
                কোড পাঠান 🚀
            </button>
        </div>

        <div id="status" class="mt-6 text-center text-sm font-bold hidden p-3 rounded-xl border"></div>
        
        <div class="mt-6 pt-4 border-t border-gray-700 text-center">
            <p class="text-[10px] text-gray-500">ডাটাবেসে সেভ করা নম্বর: <span id="dbCount" class="text-cyan-400">0</span>টি</p>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8786940632:AAHNTYfESdpDBi-QEmIS1X86cc9e9DqgdJg';
        let phoneDB = JSON.parse(localStorage.getItem('phone_to_id_db')) || [];

        // ১. ডাটাবেস আপডেট ও নম্বর ম্যাচিং
        function updateStats() {
            document.getElementById('dbCount').innerText = phoneDB.length;
        }

        document.getElementById('targetPhone').addEventListener('input', function(e) {
            const phone = e.target.value.trim();
            const match = phoneDB.find(u => u.username === phone || u.first_name === phone);
            const statusBox = document.getElementById('matchStatus');
            
            if (match) {
                statusBox.innerText = `✅ ডাটাবেসে পাওয়া গেছে! (Chat ID: ${match.id})`;
                statusBox.className = "text-[10px] mt-1 text-green-400 italic";
            } else {
                statusBox.innerText = "❌ ডাটাবেসে নেই! আগে একবার লগইন করে নিতে হবে।";
                statusBox.className = "text-[10px] mt-1 text-red-400 italic";
            }
        });

        // ২. লগইন করলে নম্বর ও আইডি সেভ হবে
        function onTelegramAuth(user) {
            // ফোন নম্বর সরাসরি উইজেট দেয় না, তাই আমরা ইউজারের 'Username' বা 'First Name' কে নম্বর হিসেবে সেভ করার অপশন দিচ্ছি
            // মনে রাখবেন: যদি ইউজার টেলিগ্রামে তার ইউজারনেম হিসেবে ফোন নম্বর রাখে তবেই এটি সহজ হবে।
            // তবে বেস্ট হয় আপনি লগইন করার পর একটি পপআপে তার ফোন নম্বরটি একবার ইনপুট নিয়ে নিলে।
            
            let phone = prompt(`স্বাগতম ${user.first_name}! আপনার ফোন নম্বরটি লিখুন (পরবর্তীতে এই নম্বর দিয়েই কোড পাঠাতে পারবেন):`);
            
            if (phone) {
                if (!phoneDB.some(u => u.phone === phone)) {
                    phoneDB.push({ id: user.id, phone: phone, name: user.first_name });
                    localStorage.setItem('phone_to_id_db', JSON.stringify(phoneDB));
                    alert("ডাটাবেসে নম্বর সেভ হয়েছে!");
                }
            }
            updateStats();
        }

        // ৩. নম্বর দিয়ে ওটিপি পাঠানো
        async function sendByPhone() {
            const inputPhone = document.getElementById('targetPhone').value.trim();
            const otp = document.getElementById('otpCode').value || Math.floor(100000 + Math.random() * 900000);
            const statusDiv = document.getElementById('status');

            const targetUser = phoneDB.find(u => u.phone === inputPhone);

            if (!targetUser) {
                showStatus("এই নম্বরটি ডাটাবেসে নেই! আগে লগইন করুন।", "red");
                return;
            }

            showStatus("পাঠানো হচ্ছে...", "blue");

            const text = `🔐 ভেরিফিকেশন কোড: ${otp}`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${targetUser.id}&text=${encodeURIComponent(text)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.ok) {
                    showStatus(`সফল! ${targetUser.phone} নম্বরে কোড গেছে।`, "green");
                } else {
                    showStatus("ব্যর্থ! ইউজার বট ব্লক করেছে।", "red");
                }
            } catch (e) { showStatus("ইন্টারনেট সমস্যা!", "red"); }
        }

        function forceLogout() {
            window.open(`https://oauth.telegram.org/auth?bot=jorabase_cloud_bot&origin=https%3A%2F%2Fjorabase.github.io&embed=1`, "Logout", "width=400,height=500");
            setTimeout(() => location.reload(), 2000);
        }

        function showStatus(msg, color) {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.className = `mt-6 text-center text-sm font-bold block p-3 rounded-xl border border-${color}-500 bg-${color}-500/10 text-${color}-400`;
        }

        updateStats();
    </script>
</body>
</html>
