<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoraBase Unlimited OTP Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-grad { background-image: linear-gradient(to right, #1FA2FF 0%, #12D8FA 51%, #1FA2FF 100%); transition: 0.5s; background-size: 200% auto; }
        .btn-grad:hover { background-position: right center; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 mb-6 text-center">JoraBase OTP Pro</h1>

        <div class="bg-gray-700 p-4 rounded-xl mb-6">
            <p class="text-sm text-gray-300 mb-3 text-center">নতুন নম্বর এড করতে নিচের বাটনে ক্লিক করুন:</p>
            <div class="flex justify-center" id="widget-container">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-login="jorabase_cloud_bot" 
                        data-size="large" 
                        data-onauth="onTelegramAuth(user)" 
                        data-request-access="write"></script>
            </div>
            <p class="text-[10px] text-gray-400 mt-2 text-center">*নতুন নম্বর এড করতে ইনকগনিটো মোড বা অন্য ব্রাউজার ব্যবহার করা ভালো।</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">প্রাপক সিলেক্ট করুন (Saved Numbers)</label>
                <select id="userSelect" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </select>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">ওটিপি কোড (OTP)</label>
                <div class="flex gap-2">
                    <input type="number" id="customCode" placeholder="যেমন: ৮৮৯৯০০" class="flex-1 bg-gray-900 border border-gray-600 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="generateRandom()" class="bg-gray-600 px-3 rounded-lg hover:bg-gray-500">🔄</button>
                </div>
            </div>

            <button onclick="sendOTP()" class="w-full btn-grad py-4 rounded-xl font-bold text-lg shadow-lg transform active:scale-95 transition">
                কোড পাঠান 🚀
            </button>
        </div>

        <div id="status" class="mt-5 text-center text-sm font-medium p-2 rounded hidden"></div>

        <div class="mt-8 pt-4 border-t border-gray-700 flex justify-between text-[11px]">
            <button onclick="exportData()" class="text-blue-400 hover:underline">ব্যাকআপ নিন</button>
            <button onclick="clearAllData()" class="text-red-400 hover:underline">সব ডিলিট করুন</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8786940632:AAHNTYfESdpDBi-QEmIS1X86cc9e9DqgdJg';
        let userDatabase = JSON.parse(localStorage.getItem('otp_users')) || [];

        function updateUI() {
            const select = document.getElementById('userSelect');
            select.innerHTML = userDatabase.length ? '' : '<option value="">কোনো নম্বর এড করা নেই</option>';
            userDatabase.forEach(user => {
                const option = document.createElement('option');
                option.value = user.id;
                option.textContent = `${user.first_name} (ID: ${user.id})`;
                select.appendChild(option);
            });
        }

        function onTelegramAuth(user) {
            if (!userDatabase.some(u => u.id === user.id)) {
                userDatabase.push({ id: user.id, first_name: user.first_name });
                localStorage.setItem('otp_users', JSON.stringify(userDatabase));
                showStatus(`সফল! ${user.first_name} লিস্টে এড হয়েছে।`, 'green');
            } else {
                showStatus(`এই নম্বরটি অলরেডি লিস্টে আছে!`, 'yellow');
            }
            updateUI();
        }

        async function sendOTP() {
            const userId = document.getElementById('userSelect').value;
            let otp = document.getElementById('customCode').value;
            
            if (!userId) return showStatus("আগে একটি নম্বর সিলেক্ট করুন!", "red");
            if (!otp) otp = Math.floor(100000 + Math.random() * 900000);

            showStatus("পাঠানো হচ্ছে...", "blue");

            const msg = `🔐 JoraBase Cloud Verification\n\nআপনার ওটিপি কোড: ${otp}\n\nএটি গোপনীয় রাখুন।`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${userId}&text=${encodeURIComponent(msg)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.ok) {
                    showStatus(`সাফল্য! আইডি ${userId}-এ ${otp} কোডটি গেছে।`, "green");
                } else {
                    showStatus("মেসেজ যায়নি। ইউজার কি বট ব্লক করেছে?", "red");
                }
            } catch (e) { showStatus("ইন্টারনেট সমস্যা!", "red"); }
        }

        function generateRandom() {
            document.getElementById('customCode').value = Math.floor(100000 + Math.random() * 900000);
        }

        function showStatus(msg, color) {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.className = `mt-5 text-center text-sm font-medium p-2 rounded block bg-${color}-900/50 text-${color}-400 border border-${color}-700`;
            s.classList.remove('hidden');
        }

        function clearAllData() {
            if(confirm("সব সেভ করা নম্বর মুছে ফেলবেন?")) {
                localStorage.removeItem('otp_users');
                userDatabase = [];
                updateUI();
            }
        }

        function exportData() {
            alert("আপনার সেভ করা ইউজার সংখ্যা: " + userDatabase.length);
            console.log(userDatabase);
        }

        updateUI();
    </script>
</body>
</html>
