<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoraBase Cloud OTP</title>
</head>
<body>

    <div style="text-align: center; margin-top: 50px;">
        <h2>টেলিগ্রাম দিয়ে লগইন করে OTP নিন</h2>
        
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="jorabase_cloud_bot" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>
    </div>

    <script type="text/javascript">
      function onTelegramAuth(user) {
        // লগইন সফল হলে ইউজারের আইডি কনসোলে দেখাবে
        console.log(user);
        alert('লগইন সফল! আপনার আইডি: ' + user.id);

        // এখন একটি টেস্ট মেসেজ (OTP) পাঠানো যাক
        const botToken = '8786940632:AAHNTYfESdpDBi-QEmIS1X86cc9e9DqgdJg';
        const otp = Math.floor(100000 + Math.random() * 900000); // ৬ ডিজিট ওটিপি
        
        const message = `আপনার ভেরিফিকেশন কোড হলো: ${otp}`;
        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${user.id}&text=${encodeURIComponent(message)}`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    alert('আপনার টেলিগ্রামে একটি ওটিপি পাঠানো হয়েছে!');
                } else {
                    alert('মেসেজ পাঠাতে সমস্যা হয়েছে।');
                }
            })
            .catch(err => console.error(err));
      }
    </script>

</body>
</html>
