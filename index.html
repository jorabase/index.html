<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoraBase Ultimate OTP Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-lg">
        <h1 class="text-3xl font-black text-center bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent mb-8">
            JORABASE OTP PRO 🚀
        </h1>

        <div class="mb-8 p-5 bg-slate-800/50 rounded-2xl border border-slate-700">
            <h2 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">১. একাউন্ট কানেক্ট করুন</h2>
            <div class="flex flex-col items-center gap-4">
                <div id="telegram-login-container">
                    <script async src="https://telegram.org/js/telegram-widget.js?22" 
                            data-telegram-login="jorabase_cloud_bot" 
                            data-size="large" 
                            data-onauth="onTelegramAuth(user)" 
                            data-request-access="write"></script>
                </div>
                
                <div class="flex gap-2 w-full">
                    <button onclick="forceDisconnect()" class="flex-1 bg-red-500/20 text-red-400 border border-red-500/50 py-2 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition">
                        নতুন নম্বর (LOGOUT)
                    </button>
                    <button onclick="location.reload()" class="flex-1 bg-slate-700 text-slate-300 py-2 rounded-xl text-xs font-bold hover:bg-slate-600 transition">
                        পেজ রিফ্রেশ 🔄
                    </button>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">২. ওটিপি টেস্টিং প্যানেল</h2>
            
            <div>
                <label class="block text-xs font-medium mb-2 text-slate-300">প্রাপক (Saved User List)</label>
                <select id="userSelect" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">লোডিং হচ্ছে...</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-medium mb-2 text-slate-300">ভেরিফিকেশন কোড (Custom Code)</label>
                <div class="flex gap-2">
                    <input type="number" id="otpCode" placeholder="যেমন: 778899" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="generateOTP()" class="bg-slate-700 px-4 rounded-xl hover:bg-slate-600 transition">🎲</button>
                </div>
            </div>

            <button onclick="sendOTP()" class="w-full btn-primary py-4 rounded-2xl font-black text-lg tracking-wide shadow-lg">
                কোড পাঠান (SEND OTP) ✈️
            </button>
        </div>

        <div id="status" class="mt-6 p-3 rounded-xl text-center text-sm font-bold hidden border"></div>

        <div class="mt-10 pt-6 border-t border-slate-800 flex justify-between">
            <button onclick="clearDatabase()" class="text-[10px] text-red-500 hover:underline uppercase font-bold tracking-tighter">Database Clear</button>
            <p class="text-[10px] text-slate-500 font-mono">Build: 2026.03.25</p>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8786940632:AAHNTYfESdpDBi-QEmIS1X86cc9e9DqgdJg';
        const BOT_USER = 'jorabase_cloud_bot';
        let userDB = JSON.parse(localStorage.getItem('jora_db')) || [];

        // ১. ডাটাবেস এবং ইউআই আপডেট করা
        function updateList() {
            const select = document.getElementById('userSelect');
            select.innerHTML = userDB.length ? '' : '<option value="">আগে নম্বর এড করুন</option>';
            userDB.forEach(user => {
                const opt = document.createElement('option');
                opt.value = user.id;
                opt.textContent = `${user.first_name} [ID: ${user.id}]`;
                select.appendChild(opt);
            });
        }

        // ২. টেলিগ্রাম অথরাইজেশন হ্যান্ডলার
        function onTelegramAuth(user) {
            if (!userDB.some(u => u.id === user.id)) {
                userDB.push({ id: user.id, first_name: user.first_name });
                localStorage.setItem('jora_db', JSON.stringify(userDB));
                showStatus(`নতুন ইউজার এড হয়েছে: ${user.first_name}`, 'emerald');
            } else {
                showStatus(`স্বাগতম ফিরে আসার জন্য, ${user.first_name}!`, 'blue');
            }
            updateList();
        }

        // ৩. ওটিপি পাঠানোর ফাংশন
        async function sendOTP() {
            const id = document.getElementById('userSelect').value;
            let code = document.getElementById('otpCode').value;
            
            if (!id) return showStatus("দয়া করে একজন ইউজার সিলেক্ট করুন!", "amber");
            if (!code) code = Math.floor(100000 + Math.random() * 900000);

            showStatus("প্রসেসিং...", "blue");

            const text = `🔐 *JoraBase Verification Code*\n\nআপনার কোডটি হলো: \`${code}\`\n\nএটি কারো সাথে শেয়ার করবেন না।`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.ok) {
                    showStatus(`সাফল্য! আইডি ${id}-এ কোড ${code} পাঠানো হয়েছে।`, 'emerald');
                } else {
                    showStatus("Error: মেসেজ যায়নি। ইউজারকে বট স্টার্ট করতে বলুন।", "red");
                }
            } catch (err) {
                showStatus("নেটওয়ার্ক এরর! চেক করুন।", "red");
            }
        }

        // ৪. স্মার্ট ডিসকানেক্ট পপ-আপ
        function forceDisconnect() {
            if(confirm("নতুন নম্বর এড করতে আপনাকে টেলিগ্রাম সেশন থেকে ডিসকানেক্ট হতে হবে। আমি কি নতুন উইন্ডো খুলব?")) {
                const url = `https://oauth.telegram.org/auth?bot=${BOT_USER}&origin=https%3A%2F%2Fjorabase.github.io&embed=1`;
                const w = 450, h = 600;
                const l = (window.screen.width/2)-(w/2), t = (window.screen.height/2)-(h/2);
                
                window.open(url, "TLogout", `width=${w},height=${h},top=${t},left=${l}`);
                
                showStatus("পপ-আপে 'Disconnect' করে পেজ রিফ্রেশ দিন।", "amber");
            }
        }

        // ৫. ইউটিলিটি ফাংশনস
        function generateOTP() {
            document.getElementById('otpCode').value = Math.floor(100000 + Math.random() * 900000);
        }

        function showStatus(msg, color) {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.classList.remove('hidden');
            s.className = `mt-6 p-3 rounded-xl text-center text-sm font-bold block bg-${color}-500/10 text-${color}-400 border-${color}-500/30`;
        }

        function clearDatabase() {
            if(confirm("সব ডাটা মুছে ফেলবেন?")) {
                localStorage.removeItem('jora_db');
                userDB = [];
                updateList();
                showStatus("ডাটাবেস ক্লিয়ার করা হয়েছে।", "red");
            }
        }

        // ইনিশিয়াল লোড
        updateList();
    </script>
</body>
</html>
